<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <!-- Title is set at render time from DATA.period + DATA.client (see bottom script). -->
  <title>Financial Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ==== Palette + tokens: COPIED VERBATIM from the Heirloom design source. ====
       This navy/mint TurnkeyCFO identity is the CONSISTENT look for EVERY client's
       monthly dashboard. Do not recolor per client. Only the numbers change. */
    :root {
      --navy-950: #041824;
      --navy-900: #082638;
      --navy-800: #0e3c57;
      --navy-700: #17567b;
      --mint-500: #36d58c;
      --mint-400: #67e6a8;
      --mint-200: #c7f7dd;
      --amber-500: #f2a93b;
      --red-500: #f05e73;
      --ice-100: #edf5f9;
      --ice-200: #dbe8f0;
      --slate-500: #698293;
      --slate-700: #284454;
      --white: #ffffff;
      --shadow: 0 22px 60px rgba(8, 38, 56, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --font-body: "Plus Jakarta Sans", sans-serif;
      --font-display: "Plus Jakarta Sans", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--navy-900);
      background:
        radial-gradient(circle at top right, rgba(54, 213, 140, 0.20), transparent 28%),
        radial-gradient(circle at left center, rgba(8, 38, 56, 0.08), transparent 32%),
        linear-gradient(180deg, #f7fbfd 0%, #edf4f7 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.45) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.28;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1220px, calc(100% - 28px));
      margin: 20px auto 48px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(4, 24, 36, 0.98), rgba(14, 60, 87, 0.96)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
      color: var(--white);
      border-radius: 32px;
      padding: 30px 30px 34px;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      right: -140px;
      top: -160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(103, 230, 168, 0.28), transparent 68%);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 26px;
    }

    .brand-lockup { display: flex; flex-direction: column; gap: 10px; }
    .brand-logo { height: 54px; width: auto; display: block; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint-500);
      box-shadow: 0 0 18px rgba(54, 213, 140, 0.8);
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.88);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-chip,
    .ghost-link {
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    .hero-chip {
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
    }

    .ghost-link {
      background: rgba(54, 213, 140, 0.16);
      color: var(--mint-200);
      border: 1px solid rgba(54, 213, 140, 0.26);
    }

    .hero-copy {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 26px;
      align-items: end;
    }

    h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    h1 span { color: var(--mint-400); }

    .hero-copy p {
      margin: 0;
      max-width: 720px;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.80);
    }

    .hero-summary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-lg);
      padding: 18px 18px 16px;
      backdrop-filter: blur(10px);
    }

    .hero-summary-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.64);
      margin-bottom: 10px;
    }

    .hero-summary-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      color: #ffe5e9;
      margin-bottom: 8px;
    }
    .hero-summary-value.positive { color: var(--mint-200); }

    .hero-summary-note {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.76);
    }

    .tabs {
      display: inline-flex;
      gap: 10px;
      margin: 24px 0 18px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(8, 38, 56, 0.08);
      border-radius: 999px;
      box-shadow: 0 12px 30px rgba(8, 38, 56, 0.08);
      position: sticky;
      top: 12px;
      z-index: 8;
      backdrop-filter: blur(10px);
    }

    .tab-button {
      border: 0;
      background: transparent;
      color: var(--slate-500);
      padding: 12px 18px;
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab-button.active {
      background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
      color: var(--white);
      box-shadow: 0 10px 22px rgba(8, 38, 56, 0.22);
    }

    .panel { display: none; animation: fade-up 0.45s ease; }
    .panel.active { display: block; }

    .grid-four,
    .grid-two { display: grid; gap: 18px; }
    .grid-four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(8, 38, 56, 0.08);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: 0 18px 42px rgba(8, 38, 56, 0.08);
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }

    .kpi-card {
      position: relative;
      overflow: hidden;
      min-height: 150px;
    }

    .kpi-card::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      right: -44px;
      top: -54px;
      background: radial-gradient(circle, rgba(54, 213, 140, 0.18), transparent 70%);
      pointer-events: none;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--slate-500);
      margin-bottom: 12px;
    }

    .value {
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
      color: var(--navy-900);
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    .value.negative { color: var(--red-500); }
    .value.positive { color: #15945d; }

    .subtext {
      font-size: 13px;
      line-height: 1.6;
      color: var(--slate-700);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .pill.red { background: rgba(240, 94, 115, 0.12); color: var(--red-500); }
    .pill.green { background: rgba(54, 213, 140, 0.14); color: #15945d; }
    .pill.amber { background: rgba(242, 169, 59, 0.14); color: #9d6509; }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin: 10px 0 18px;
    }

    .section-head h2,
    .card h3 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.1;
      font-family: var(--font-display);
      letter-spacing: -0.03em;
      color: var(--navy-900);
    }

    .section-head p,
    .card-intro {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--slate-700);
      max-width: 760px;
    }

    .bar-chart { margin-top: 18px; display: grid; gap: 14px; }
    .bar-row { display: grid; grid-template-columns: 86px minmax(0, 1fr); gap: 12px; align-items: center; }
    .bar-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--navy-800);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .bar-group { display: grid; gap: 8px; }
    .bar-track {
      position: relative;
      background: var(--ice-100);
      border-radius: 999px;
      height: 16px;
      overflow: hidden;
    }
    .bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: inherit;
    }
    .fill-revenue { background: linear-gradient(90deg, var(--mint-500), var(--mint-400)); }
    .fill-expense { background: linear-gradient(90deg, #4d6e80, #8aa7b8); }
    .fill-loss { background: linear-gradient(90deg, var(--red-500), #ff8b99); }
    .fill-amber { background: linear-gradient(90deg, var(--amber-500), #ffd27b); }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--slate-700);
      font-weight: 700;
    }

    /* ==== SVG chart suite (time runs horizontally, left -> right) ==== */
    .chart-wrap { margin-top: 16px; }
    .chart-svg { width: 100%; height: auto; display: block; }
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 14px;
      align-items: center;
    }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-700);
    }
    .legend-swatch { width: 13px; height: 13px; border-radius: 4px; flex: 0 0 auto; }
    .ax { font: 700 11px var(--font-body); fill: var(--slate-500); letter-spacing: 0.02em; }
    .ax-focus { fill: var(--navy-900); }
    .ax-year { font: 800 10px var(--font-body); fill: var(--slate-500); opacity: 0.75; }
    .chart-callout { font: 800 12px var(--font-body); fill: var(--navy-900); }
    .chart-callout.neg { fill: var(--red-500); }
    .chart-callout.pos { fill: #15945d; }
    /* On-chart numeric data labels */
    .val-label { font: 800 9.5px var(--font-body); fill: var(--navy-800); }
    .val-label.rev { fill: #15945d; }
    .val-label.exp { fill: var(--slate-700); }
    .val-label.neg { fill: var(--red-500); }
    .pt-label { font: 800 10px var(--font-body); }
    .pt-label.pos { fill: #15945d; }
    .pt-label.neg { fill: var(--red-500); }
    .spark { width: 100%; height: 30px; margin-top: 12px; display: block; }

    /* ==== Financial statement tabs (QBO-style) ==== */
    .stmt-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .stmt-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
      color: var(--white);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(8, 38, 56, 0.18);
      transition: 0.2s ease;
    }
    .stmt-btn:hover { transform: translateY(-1px); }
    .stmt-btn.ghost {
      background: rgba(54, 213, 140, 0.14);
      color: #0e7a4b;
      border: 1px solid rgba(54, 213, 140, 0.4);
      box-shadow: none;
    }
    .stmt-card { padding: 30px 34px 26px; }
    .stmt-head { text-align: center; margin-bottom: 8px; }
    .stmt-org {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--navy-900);
    }
    .stmt-title {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--navy-700);
      margin-top: 4px;
    }
    .stmt-sub { font-size: 13px; color: var(--slate-500); font-weight: 700; margin-top: 3px; }
    .stmt-rule {
      height: 3px;
      background: linear-gradient(90deg, var(--mint-500), rgba(54, 213, 140, 0.1));
      border-radius: 999px;
      margin: 16px 0 6px;
    }
    .stmt-scroll { overflow-x: auto; }
    table.stmt-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    .stmt-table td {
      padding: 7px 10px;
      font-size: 13.5px;
      color: var(--navy-900);
      border-bottom: 1px solid rgba(8, 38, 56, 0.05);
    }
    .stmt-table .st-amt {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      width: 160px;
    }
    .stmt-table .st-section td {
      font-weight: 800;
      color: var(--navy-800);
      padding-top: 14px;
      border-bottom: 0;
    }
    .stmt-table .st-line td { color: var(--slate-700); }
    .stmt-table .st-subtotal td {
      font-weight: 800;
      border-top: 1.5px solid rgba(8, 38, 56, 0.35);
      border-bottom: 0;
      padding-bottom: 10px;
    }
    .stmt-table .st-total td {
      font-weight: 800;
      font-size: 14.5px;
      border-top: 2px solid var(--navy-900);
      border-bottom: 3px double var(--navy-900);
      background: rgba(54, 213, 140, 0.07);
    }
    .stmt-table .st-neg { color: var(--red-500); }

    /* Print: "Download PDF" prints ONLY the selected statement, letterhead style. */
    @media print {
      body[data-print] { background: #fff !important; }
      body[data-print]::before { display: none !important; }
      body[data-print] .hero,
      body[data-print] .tabs,
      body[data-print] .footer,
      body[data-print] .section-head,
      body[data-print] .stmt-actions { display: none !important; }
      body[data-print] .panel { display: none !important; }
      body[data-print="pl"] #stmt-pl-tab,
      body[data-print="bs"] #stmt-bs-tab,
      body[data-print="cf"] #stmt-cf-tab { display: block !important; }
      body[data-print] .shell { width: 100%; margin: 0; }
      body[data-print] .card {
        box-shadow: none !important;
        border: 0 !important;
        border-radius: 0 !important;
        background: #fff !important;
        padding: 0 !important;
      }
      body[data-print] .stmt-table .st-total td { background: #fff !important; }
      body[data-print] .stmt-table tr { break-inside: avoid; }
    }

    .stack { display: grid; gap: 14px; margin-top: 14px; }
    .stack-row { display: grid; gap: 8px; }
    .stack-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      font-size: 13px;
    }
    .stack-head strong { color: var(--navy-900); }
    .stack-head span {
      color: var(--slate-700);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stack-track {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--ice-100);
    }
    .stack-fill { height: 100%; border-radius: inherit; }

    .insight-list,
    .action-list {
      list-style: none;
      margin: 18px 0 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .insight-list li,
    .action-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.7;
      color: var(--slate-700);
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(8, 38, 56, 0.08);
    }

    .insight-list li:last-child,
    .action-list li:last-child { border-bottom: 0; padding-bottom: 0; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 8px;
      flex: 0 0 auto;
    }
    .dot.red { background: var(--red-500); }
    .dot.green { background: var(--mint-500); }
    .dot.amber { background: var(--amber-500); }
    .dot.navy { background: var(--navy-700); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--slate-500);
      padding: 12px 10px;
      border-bottom: 2px solid var(--ice-200);
    }
    td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(8, 38, 56, 0.07);
      font-size: 13px;
      color: var(--navy-900);
    }
    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }
    tr.total-row td {
      border-top: 2px solid var(--navy-900);
      border-bottom: 0;
      font-weight: 800;
    }

    .callout {
      background: linear-gradient(135deg, rgba(54, 213, 140, 0.12), rgba(255, 255, 255, 0.95));
      border: 1px solid rgba(54, 213, 140, 0.16);
    }
    .callout p {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: var(--slate-700);
    }

    .micro-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .micro-card {
      background: rgba(4, 24, 36, 0.03);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .small-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--slate-500);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .small-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--navy-900);
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .small-note {
      font-size: 13px;
      color: var(--slate-700);
      line-height: 1.6;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }
    .tag.recurring { background: rgba(54, 213, 140, 0.14); color: #15945d; }
    .tag.one-time { background: rgba(8, 38, 56, 0.08); color: var(--navy-700); }
    .tag.both { background: rgba(242, 169, 59, 0.14); color: #9d6509; }

    .donor-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .reveal-button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
      color: var(--white);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .amount-hidden {
      color: transparent;
      position: relative;
      user-select: none;
    }

    .amount-hidden::after {
      content: "Hidden";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-500);
      background: rgba(8, 38, 56, 0.06);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footnote {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--slate-500);
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--slate-500);
      line-height: 1.7;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1040px) {
      .grid-four { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    // ---------- TABS ----------
    function tabs(d) {
      const st = d.statements || {};
      const np = d.client.type === "church" || d.client.type === "nonprofit";
      // Nonprofits get the QBO nonprofit statement names on the tabs too.
      const plLabel = np ? "Statement of Activity" : "P&amp;L";
      const bsLabel = np ? "Statement of Financial Position" : "Balance Sheet";
      const btn = (target, label, active) =>
        `<button class="tab-button${active ? " active" : ""}" data-target="${target}" role="tab" aria-selected="${active ? "true" : "false"}">${label}</button>`;
      return `
      <div class="tabs" role="tablist" aria-label="Financial dashboard tabs">
        ${btn("qbo-tab", "Month in Review", true)}
        ${st.pl ? btn("stmt-pl-tab", plLabel) : ""}
        ${st.bs ? btn("stmt-bs-tab", bsLabel) : ""}
        ${st.cf ? btn("stmt-cf-tab", "Cash Flow") : ""}
        ${d.giving ? btn("giving-tab", "Giving") : ""}
      </div>`;
    }

    // ---------- KPI ROW (with trailing-window sparklines) ----------
    function sparkline(vals, color) {
      if (!vals || vals.length < 2) return "";
      const W = 120, H = 30, p = 4;
      const mx = Math.max(...vals), mn = Math.min(...vals);
      const rng = (mx - mn) || 1;
      const pts = vals.map((v, i) => [
        p + (W - 2 * p) * i / (vals.length - 1),
        p + (H - 2 * p) * (1 - (v - mn) / rng),
      ]);
      const line = pts.map(pt => pt.map(n => n.toFixed(1)).join(",")).join(" ");
      const last = pts[pts.length - 1];
      return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
        <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
        <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.8" fill="${color}"/>
      </svg>`;
    }
    function kpiCard(label, value, valueClass, sub, pill, spark) {
      return `
      <article class="card kpi-card">
        <div class="label">${esc(label)}</div>
        <div class="value ${valueClass}">${value}</div>
        <div class="subtext">${sub}</div>
        ${pill || ""}
        ${spark || ""}
      </article>`;
    }
    function deltaPill(pctVal, goodWhenUp) {
      if (pctVal == null) return "";
      const up = pctVal >= 0;
      const good = goodWhenUp ? up : !up;
      const cls = good ? "green" : "amber";
      return `<div class="pill ${cls}">${signPct(pctVal)} vs prior month</div>`;
    }
    function kpis(d) {
      const k = d.kpis;
      const t = d.trend || [];
      const netClass = k.net_income >= 0 ? "positive" : "negative";
      const netColor = k.net_income >= 0 ? "#36d58c" : "#f05e73";
      return `
      <div class="grid-four">
        ${kpiCard(d.period.month_name + " Revenue", money(k.revenue), "",
          `Total income recognized in ${esc(d.period.month_name)} per QuickBooks.`,
          deltaPill(k.revenue_mom_pct, true),
          sparkline(t.map(m => m.revenue), "#36d58c"))}
        ${kpiCard(d.period.month_name + " Expenditures", money(k.expenses), "",
          `Total spend for the month across all categories.`,
          deltaPill(k.expenses_mom_pct, false),
          sparkline(t.map(m => m.expenses), "#4d6e80"))}
        ${kpiCard(d.period.month_name + " Net Income", money(k.net_income), netClass,
          `Revenue less expenditures. Margin ${k.revenue ? (k.net_income / k.revenue * 100).toFixed(1) : "0.0"}%.`,
          deltaPill(k.net_mom_pct, true),
          sparkline(t.map(m => m.net), netColor))}
        ${kpiCard("Cash Position", money(k.cash), "",
          `Bank balances as of ${esc(ASOF_HUMAN)} from the balance sheet.`,
          `<div class="pill green">Balance sheet</div>`)}
      </div>`;
    }

    // ---------- SVG CHART SUITE (time runs horizontally, left -> right) ----------
    // All charts are inline SVG generated from DATA — no chart library, no CDN,
    // fully self-contained so the page still renders after the encryption gate.
    const kFmt = (v) => {
      const a = Math.abs(v);
      const body = a >= 1000
        ? (a / 1000).toFixed(a >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k"
        : Math.round(a).toString();
      return (v < 0 ? "-$" : "$") + body;
    };
    function niceRange(minV, maxV, count = 4) {
      if (minV === maxV) maxV = minV + 1;
      const rough = (maxV - minV) / count;
      const pow = Math.pow(10, Math.floor(Math.log10(rough)));
      let step = pow * 10;
      for (const c of [1, 2, 2.5, 5, 10]) { if (rough <= c * pow) { step = c * pow; break; } }
      const lo = Math.floor(minV / step) * step;
      const hi = Math.ceil(maxV / step) * step;
      const ticks = [];
      for (let v = lo; v <= hi + step * 1e-6; v += step) ticks.push(v);
      return { lo, hi, ticks };
    }
    function axisGrid(ticks, y, padL, W, padR, emphasizeZero) {
      return ticks.map(tk => {
        const yy = y(tk);
        const zero = emphasizeZero && Math.abs(tk) < 1e-9;
        return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W - padR}" y2="${yy.toFixed(1)}"
          stroke="${zero ? "rgba(8,38,56,0.42)" : "rgba(8,38,56,0.08)"}" stroke-width="${zero ? 1.5 : 1}"/>
          <text x="${padL - 8}" y="${(yy + 4).toFixed(1)}" text-anchor="end" class="ax">${kFmt(tk)}</text>`;
      }).join("");
    }
    function monthAxis(items, x, H, padB, focusIdx) {
      return items.map((m, i) => {
        const cx = x(i);
        const mNum = parseInt(m.month.split("-")[1], 10);
        const yr = (i === 0 || mNum === 1) ? `<text x="${cx.toFixed(1)}" y="${H - padB + 32}" text-anchor="middle" class="ax-year">'${m.month.slice(2, 4)}</text>` : "";
        return `<text x="${cx.toFixed(1)}" y="${H - padB + 18}" text-anchor="middle" class="ax ${i === focusIdx ? "ax-focus" : ""}">${esc(m.label)}</text>${yr}`;
      }).join("");
    }
    const legendChip = (color, label) =>
      `<span class="legend-chip"><span class="legend-swatch" style="background:${color}"></span>${esc(label)}</span>`;

    // Grouped column chart: revenue vs spend, one column pair per month.
    function columnChart(d) {
      const t = d.trend;
      const W = 860, H = 356, padL = 58, padR = 16, padT = 40, padB = 46;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const focusIdx = t.length - 1;
      const { hi, ticks } = niceRange(0, Math.max(1, ...t.map(m => Math.max(m.revenue, m.expenses))));
      const y = v => padT + plotH * (1 - v / hi);
      const slotW = plotW / t.length;
      const x = i => padL + slotW * (i + 0.5);
      const barW = Math.min(15, slotW * 0.34);
      let bars = "";
      const revCx = i => x(i) - barW / 2 - 1.5;
      const expCx = i => x(i) + barW / 2 + 1.5;
      t.forEach((m, i) => {
        const cx = x(i);
        const focus = i === focusIdx;
        const eFill = m.net < 0 ? "url(#cGradLoss)" : "url(#cGradExp)";
        if (focus) bars += `<rect x="${(cx - slotW / 2 + 2).toFixed(1)}" y="${padT - 8}" width="${(slotW - 4).toFixed(1)}" height="${plotH + 14}" rx="10" fill="rgba(54,213,140,0.07)" stroke="rgba(54,213,140,0.5)" stroke-dasharray="3 4"/>`;
        bars += `<g opacity="${focus ? 1 : 0.85}">
          <rect x="${(cx - barW - 1.5).toFixed(1)}" y="${y(m.revenue).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(plotH - (y(m.revenue) - padT), 1.5).toFixed(1)}" rx="3.5" fill="url(#cGradRev)"><title>${esc(m.label)} ${m.month.slice(0, 4)} revenue: ${money(m.revenue)}</title></rect>
          <rect x="${(cx + 1.5).toFixed(1)}" y="${y(m.expenses).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(plotH - (y(m.expenses) - padT), 1.5).toFixed(1)}" rx="3.5" fill="${eFill}"><title>${esc(m.label)} ${m.month.slice(0, 4)} spend: ${money(m.expenses)}</title></rect>
        </g>`;
      });
      // Data labels above every column (revenue mint, spend slate/red), rotated
      // vertical so 13 months' worth never collide horizontally.
      let labels = "";
      t.forEach((m, i) => {
        const rx = revCx(i), ex = expCx(i);
        labels += `<text transform="translate(${rx.toFixed(1)},${(y(m.revenue) - 5).toFixed(1)}) rotate(-90)" class="val-label rev">${kFmt(m.revenue)}</text>`;
        labels += `<text transform="translate(${ex.toFixed(1)},${(y(m.expenses) - 5).toFixed(1)}) rotate(-90)" class="val-label ${m.net < 0 ? "neg" : "exp"}">${kFmt(m.expenses)}</text>`;
      });
      return `
      <article class="card">
        <h3>Revenue vs. spend, month by month</h3>
        <p class="card-intro">Time runs left to right through ${esc(d.period.label)}, the highlighted month. Mint columns are revenue; slate columns are spend, shown red in any month that ran a deficit. Hover any column for the exact figure.</p>
        <div class="chart-wrap">
          <svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Monthly revenue versus spend column chart">
            <defs>
              <linearGradient id="cGradRev" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#67e6a8"/><stop offset="100%" stop-color="#2bbf7c"/></linearGradient>
              <linearGradient id="cGradExp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8aa7b8"/><stop offset="100%" stop-color="#4d6e80"/></linearGradient>
              <linearGradient id="cGradLoss" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8b99"/><stop offset="100%" stop-color="#f05e73"/></linearGradient>
            </defs>
            ${axisGrid(ticks, y, padL, W, padR, false)}
            ${bars}
            ${labels}
            ${monthAxis(t, x, H, padB, focusIdx)}
          </svg>
        </div>
        <div class="legend">
          ${legendChip("linear-gradient(180deg,#67e6a8,#2bbf7c)", "Revenue")}
          ${legendChip("linear-gradient(180deg,#8aa7b8,#4d6e80)", "Spend (surplus month)")}
          ${legendChip("linear-gradient(180deg,#ff8b99,#f05e73)", "Spend (deficit month)")}
        </div>
      </article>`;
    }

    // Line + area chart over the trend window. Positive area mint, negative red.
    function lineAreaChart(items, opts) {
      const W = 620, H = 320, padL = 58, padR = 18, padT = 20, padB = 46;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const vals = items.map(m => m.v);
      const focusIdx = items.length - 1;
      const { lo, hi, ticks } = niceRange(Math.min(0, ...vals), Math.max(0, ...vals));
      const y = v => padT + plotH * (1 - (v - lo) / (hi - lo));
      const x = i => padL + plotW * (items.length === 1 ? 0.5 : i / (items.length - 1));
      const pts = items.map((m, i) => [x(i), y(m.v)]);
      const lineStr = pts.map(p => p.map(n => n.toFixed(1)).join(",")).join(" ");
      const y0 = y(0);
      const area = `M ${pts[0][0].toFixed(1)} ${y0.toFixed(1)} L ` +
        pts.map(p => `${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" L ") +
        ` L ${pts[pts.length - 1][0].toFixed(1)} ${y0.toFixed(1)} Z`;
      const dots = items.map((m, i) => {
        const focus = i === focusIdx;
        const color = m.v >= 0 ? "#15945d" : "#f05e73";
        return `<circle cx="${pts[i][0].toFixed(1)}" cy="${pts[i][1].toFixed(1)}" r="${focus ? 5.5 : 3.4}"
          fill="${color}" stroke="#ffffff" stroke-width="${focus ? 2.5 : 1.5}"><title>${esc(m.label)} ${m.month.slice(0, 4)}: ${money(m.v)}</title></circle>`;
      }).join("");
      // Data label above (surplus) / below (deficit) every point; the focus month is bolder.
      // End points anchor inward so labels never clip the chart edges.
      const callout = items.map((m, i) => {
        const px = pts[i][0], py = pts[i][1];
        const above = m.v >= 0;
        let ly = above ? py - 9 : py + 17;
        ly = Math.min(Math.max(ly, padT + 9), H - padB - 3);
        const focus = i === focusIdx;
        const anchor = i === 0 ? "start" : (i === items.length - 1 ? "end" : "middle");
        const lx = i === 0 ? px - 3 : (i === items.length - 1 ? px + 3 : px);
        return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" class="${focus ? "chart-callout" : "pt-label"} ${m.v >= 0 ? "pos" : "neg"}"${focus ? ' style="font-size:12.5px"' : ""}>${kFmt(m.v)}</text>`;
      }).join("");
      return `
      <article class="card">
        <h3>${esc(opts.title)}</h3>
        <p class="card-intro">${esc(opts.intro)}</p>
        <div class="chart-wrap">
          <svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(opts.title)}">
            <defs>
              <clipPath id="clipAbove${opts.uid}"><rect x="0" y="0" width="${W}" height="${y0.toFixed(1)}"/></clipPath>
              <clipPath id="clipBelow${opts.uid}"><rect x="0" y="${y0.toFixed(1)}" width="${W}" height="${(H - y0).toFixed(1)}"/></clipPath>
            </defs>
            ${axisGrid(ticks, y, padL, W, padR, true)}
            <path d="${area}" fill="rgba(54,213,140,0.20)" clip-path="url(#clipAbove${opts.uid})"/>
            <path d="${area}" fill="rgba(240,94,115,0.16)" clip-path="url(#clipBelow${opts.uid})"/>
            <polyline points="${lineStr}" fill="none" stroke="#0e3c57" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            ${dots}
            ${callout}
            ${monthAxis(items, x, H, padB, focusIdx)}
          </svg>
        </div>
        <div class="legend">
          ${legendChip("rgba(54,213,140,0.55)", "In the black")}
          ${legendChip("rgba(240,94,115,0.5)", "In the red")}
        </div>
      </article>`;
    }
    function netLineChart(d) {
      return lineAreaChart(
        d.trend.map(m => ({ label: m.label, month: m.month, v: m.net })),
        {
          uid: "Net",
          title: "Net income trend",
          intro: `Monthly bottom line across the trailing window, ending at ${d.period.month_name}'s ${money(d.kpis.net_income)}. The heavy line at $0 separates surplus months from deficit months.`,
        });
    }
    // Cumulative net within the current fiscal (or calendar) year.
    function cumulativeChart(d) {
      const t = d.trend;
      const fyStart = d.client.fiscal_year_start_month || 1;
      let s = 0;
      for (let i = t.length - 1; i >= 0; i--) {
        if (parseInt(t[i].month.split("-")[1], 10) === fyStart) { s = i; break; }
      }
      let run = 0;
      const items = t.slice(s).map(m => ({ label: m.label, month: m.month, v: (run += m.net) }));
      const p = d.period_perspective;
      return lineAreaChart(items, {
        uid: "Cum",
        title: `${p.label} cumulative net`,
        intro: `Running ${p.mode === "fiscal" ? "fiscal-year" : "year-to-date"} net income, month over month. Each point adds that month's result to everything before it, ending at ${money(items[items.length - 1].v)} through ${d.period.month_name}.`,
      });
    }

    // ---------- STACK (composition / drivers) ----------
    function stack(items, valKey, pctKey) {
      return items.map((it, i) => `
        <div class="stack-row">
          <div class="stack-head"><strong>${esc(it.account)}</strong><span>${money(it[valKey])} | ${it[pctKey].toFixed(1)}%</span></div>
          <div class="stack-track"><div class="stack-fill ${STACK_FILLS[i % STACK_FILLS.length]}" style="width:${Math.min(100, it[pctKey]).toFixed(1)}%"></div></div>
        </div>`).join("");
    }
    function revComposition(d) {
      return `
      <article class="card">
        <h3>${esc(d.period.month_name)} revenue composition</h3>
        <p class="card-intro">How ${esc(d.period.month_name)} income broke down by source, largest first.</p>
        <div class="stack">${stack(d.revenue_composition, "amount", "pct")}</div>
        <p class="footnote">Total ${esc(d.period.month_name)} revenue per QuickBooks: ${money(d.kpis.revenue, true)}.</p>
      </article>`;
    }
    function expenseDrivers(d) {
      return `
      <article class="card">
        <h3>Largest ${esc(d.period.month_name)} expense drivers</h3>
        <p class="card-intro">These categories explain most of ${esc(d.period.month_name)}'s ${money(d.kpis.expenses)} in spend.</p>
        <div class="stack">${stack(d.expense_drivers, "amount", "pct_of_expense")}</div>
      </article>`;
    }

    // ---------- INSIGHTS / ACTIONS ----------
    const toneDot = { green: "green", amber: "amber", red: "red", navy: "navy" };
    function bulletList(items, cls) {
      return `<ul class="${cls}">` + items.map(it =>
        `<li><span class="dot ${toneDot[it.tone] || "navy"}"></span><span>${esc(it.text)}</span></li>`
      ).join("") + `</ul>`;
    }
    function insights(d) {
      return `
      <article class="card">
        <h3>${esc(d.period.month_name)} insight highlights</h3>
        ${bulletList(d.insights, "insight-list")}
      </article>`;
    }
    function perspective(d) {
      const p = d.period_perspective;
      const netCls = p.net >= 0 ? "positive" : "negative";
      const title = p.mode === "fiscal"
        ? `Fiscal-year perspective — ${esc(p.label)}`
        : `Year-to-date perspective — ${esc(p.label)}`;
      return `
      <article class="card callout">
        <h3>${title}</h3>
        <p>
          ${p.mode === "fiscal" ? "The fiscal year" : "The year"} to date shows revenue of
          ${moneyK(p.revenue)} against ${moneyK(p.expenses)} in expenditures, a
          ${money(p.net)} net result (${p.margin_pct.toFixed(1)}% margin).
        </p>
        <div class="micro-grid">
          <div class="micro-card">
            <div class="small-label">${esc(p.label)} Revenue</div>
            <div class="small-value">${money(p.revenue)}</div>
            <div class="small-note">Total income recognized ${p.mode === "fiscal" ? "this fiscal year" : "year to date"}.</div>
          </div>
          <div class="micro-card">
            <div class="small-label">${esc(p.label)} Net</div>
            <div class="small-value ${netCls === "negative" ? "" : ""}">${money(p.net)}</div>
            <div class="small-note">Against ${money(p.expenses)} of expenditures.</div>
          </div>
        </div>
      </article>`;
    }
    function cfoActions(d) {
      return `
      <article class="card">
        <h3>Key figures at a glance</h3>
        ${bulletList(d.cfo_actions, "action-list")}
      </article>`;
    }

    // ---------- TREND SUMMARY TABLE ----------
    function trendTable(d) {
      const t = d.trend;
      const th = t.map(m => `<th>${esc(m.label)}</th>`).join("");
      const totRev = t.reduce((s, m) => s + m.revenue, 0);
      const totExp = t.reduce((s, m) => s + m.expenses, 0);
      const totNet = t.reduce((s, m) => s + m.net, 0);
      const cells = (fn) => t.map(m => `<td class="num" data-label="${esc(m.label)}">${fn(m)}</td>`).join("");
      return `
      <article class="card">
        <h3>Monthly summary — trailing window through ${esc(d.period.label)}</h3>
        <table>
          <thead><tr><th>Metric</th>${th}<th>Total</th></tr></thead>
          <tbody>
            <tr>
              <td data-label="Metric">Revenue</td>
              ${cells(m => money(m.revenue))}
              <td class="num" data-label="Total">${money(totRev)}</td>
            </tr>
            <tr>
              <td data-label="Metric">Expenditures</td>
              ${cells(m => money(m.expenses))}
              <td class="num" data-label="Total">${money(totExp)}</td>
            </tr>
            <tr>
              <td data-label="Metric">Net income</td>
              ${cells(m => money(m.net))}
              <td class="num" data-label="Total">${money(totNet)}</td>
            </tr>
            <tr class="total-row">
              <td data-label="Metric">Net margin</td>
              ${cells(m => (m.revenue ? (m.net / m.revenue * 100).toFixed(1) : "0.0") + "%")}
              <td class="num" data-label="Total">${totRev ? (totNet / totRev * 100).toFixed(1) : "0.0"}%</td>
            </tr>
          </tbody>
        </table>
      </article>`;
    }

    // ---------- BALANCE SHEET ----------
    function balanceSheet(d) {
      const bs = d.balance_sheet;
      // deterministic highlights, computed from the numbers (no LLM, no hardcoding)
      const topLiab = [...bs.liabilities].sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount))[0];
      const hi = [];
      hi.push({ tone: "green", text: `Cash stands at ${money(bs.cash)} as of ${esc(ASOF_HUMAN)}, the bulk of ${money(bs.totals.assets)} in total assets.` });
      if (topLiab) hi.push({ tone: "amber", text: `Total liabilities are ${money(bs.totals.liabilities)}, led by ${esc(topLiab.name)} at ${money(topLiab.amount)}.` });
      hi.push({ tone: "green", text: `Net assets (equity) total ${money(bs.totals.equity)}.` });
      const bal = Math.abs(bs.totals.assets - (bs.totals.liabilities + bs.totals.equity));
      hi.push({ tone: bal < 1 ? "green" : "amber", text: bal < 1
        ? `The statement balances: assets equal liabilities plus equity.`
        : `Assets and liabilities-plus-equity differ by ${money(bal)}.` });
      return `
      <div class="grid-two">
        <article class="card">
          <h3>Balance sheet snapshot as of ${esc(ASOF_HUMAN)}</h3>
          <p class="card-intro">The statement of financial position at month-end.</p>
          <div class="micro-grid">
            <div class="micro-card"><div class="small-label">Total Assets</div><div class="small-value">${money(bs.totals.assets)}</div><div class="small-note">Everything the organization owns at month-end.</div></div>
            <div class="micro-card"><div class="small-label">Total Liabilities</div><div class="small-value">${money(bs.totals.liabilities)}</div><div class="small-note">Everything owed at month-end.</div></div>
            <div class="micro-card"><div class="small-label">Total Equity</div><div class="small-value">${money(bs.totals.equity)}</div><div class="small-note">Net assets, the residual after liabilities.</div></div>
            <div class="micro-card"><div class="small-label">Cash Position</div><div class="small-value">${money(bs.cash)}</div><div class="small-note">Bank account balances as of month-end.</div></div>
          </div>
        </article>
        <article class="card">
          <h3>Balance sheet highlights</h3>
          ${bulletList(hi, "insight-list")}
          <p class="footnote">Source: QuickBooks Online Statement of Financial Position, ${esc(d.client.name)}, accrual basis, as of ${esc(ASOF_HUMAN)}.</p>
        </article>
      </div>`;
    }

    // ---------- QBO PANEL ----------
    function qboPanel(d) {
      return `
      <section class="panel active" id="qbo-tab">
        <div class="section-head">
          <div>
            <h2>QuickBooks month in review</h2>
            <p>${esc(d.period.month_name)} ${d.period.year} is the focus month. Every card below is grounded in the live QuickBooks statement so the team can see what happened this month and how the ${d.period_perspective.mode === "fiscal" ? "fiscal year" : "year"} is tracking.</p>
          </div>
          <div class="pill green">${esc(d.period.label)}</div>
        </div>
        ${kpis(d)}
        ${columnChart(d)}
        <div class="grid-two">${netLineChart(d)}${cumulativeChart(d)}</div>
        <div class="grid-two">${revComposition(d)}${expenseDrivers(d)}</div>
        <div class="grid-two">${insights(d)}${cfoActions(d)}</div>
        ${perspective(d)}
        ${trendTable(d)}
        ${balanceSheet(d)}
      </section>`;
    }

    // ---------- GIVING PANEL (churches only, when data present) ----------
    function givingPanel(d) {
      if (!d.giving) return "";
      const g = d.giving;
      const kpiCards = (g.kpis || []).map(k =>
        kpiCard(k.label, k.value, "", esc(k.sub || ""), k.pill ? `<div class="pill ${k.pill_tone || "green"}">${esc(k.pill)}</div>` : "")
      ).join("");
      const fundStack = g.fund_mix ? `
        <article class="card">
          <h3>Fund mix</h3>
          <div class="stack">${stack(g.fund_mix, "amount", "pct")}</div>
        </article>` : "";
      const methodStack = g.method_mix ? `
        <article class="card">
          <h3>Payment method mix</h3>
          <div class="stack">${stack(g.method_mix, "amount", "pct")}</div>
        </article>` : "";
      const insightsCard = g.insights ? `
        <article class="card"><h3>Giving insights</h3>${bulletList(g.insights, "insight-list")}</article>` : "";
      const donorRows = (g.top_donors || []).map(r => `
        <tr>
          <td data-label="Donor">${esc(r.donor)}</td>
          <td data-label="Type"><span class="tag ${r.type_class || "one-time"}">${esc(r.type)}</span></td>
          <td data-label="Fund">${esc(r.fund || "")}</td>
          <td class="num" data-label="Gift Count">${r.count}</td>
          <td class="num amount-hidden" data-label="Net Total">${money(r.net)}</td>
        </tr>`).join("");
      const donorCard = (g.top_donors && g.top_donors.length) ? `
        <article class="card">
          <div class="donor-card-head">
            <div>
              <h3>Top ${esc(d.period.month_name)} donors</h3>
              <p class="card-intro">Donor names stay visible; amounts appear only after you click reveal.</p>
            </div>
            <button class="reveal-button" type="button" data-reveal-target="donor-table">Reveal amounts</button>
          </div>
          <table id="donor-table">
            <thead><tr><th>Donor</th><th>Type</th><th>Fund</th><th>Gift Count</th><th>Net Total</th></tr></thead>
            <tbody>${donorRows}</tbody>
          </table>
          ${g.source_note ? `<p class="footnote">${esc(g.source_note)}</p>` : ""}
        </article>` : "";
      return `
      <section class="panel" id="giving-tab">
        <div class="section-head">
          <div>
            <h2>${esc(g.source_label || "Giving")} dashboard</h2>
            <p>${esc(g.intro || (d.period.month_name + " " + d.period.year + " giving detail."))}</p>
          </div>
          <div class="pill green">${esc(d.period.label)} giving</div>
        </div>
        ${kpiCards ? `<div class="grid-four">${kpiCards}</div>` : ""}
        ${(fundStack || methodStack) ? `<div class="grid-two">${fundStack}${methodStack}</div>` : ""}
        ${insightsCard}
        ${donorCard}
      </section>`;
    }

    // ---------- FINANCIAL STATEMENT TABS (QBO-style P&L / BS / Cash Flow) ----------
    const STMT_IDS = { pl: "stmt-pl-tab", bs: "stmt-bs-tab", cf: "stmt-cf-tab" };
    function stmtRowsHtml(st) {
      return st.rows.map(r => {
        const ind = 12 + r.depth * 22;
        if (r.kind === "section") {
          return `<tr class="st-section"><td style="padding-left:${ind}px">${esc(r.label)}</td><td></td></tr>`;
        }
        const amt = r.amount == null ? "" : money(r.amount, true);
        const neg = (r.amount != null && r.amount < 0) ? " st-neg" : "";
        const cls = r.kind === "line" ? "st-line" : (r.kind === "total" ? "st-total" : "st-subtotal");
        return `<tr class="${cls}"><td style="padding-left:${ind}px">${esc(r.label)}</td><td class="st-amt${neg}">${amt}</td></tr>`;
      }).join("");
    }
    function statementPanel(d, key) {
      const st = d.statements && d.statements[key];
      if (!st) return "";
      return `
      <section class="panel" id="${STMT_IDS[key]}">
        <div class="section-head">
          <div>
            <h2>${esc(st.title)}</h2>
            <p>${esc(st.subtitle)}, exactly as pulled from QuickBooks Online${key === "cf" ? "" : " (" + esc((d.statements.basis || "").toLowerCase()) + ")"}. Download a copy below.</p>
          </div>
          <div class="stmt-actions">
            <button class="stmt-btn" type="button" data-pdf="${key}">Download PDF</button>
            <button class="stmt-btn ghost" type="button" data-xl="${key}">Download Excel</button>
          </div>
        </div>
        <article class="card stmt-card">
          <div class="stmt-head">
            <div class="stmt-org">${esc(d.client.name)}</div>
            <div class="stmt-title">${esc(st.title)}</div>
            <div class="stmt-sub">${esc(st.subtitle)}</div>
          </div>
          <div class="stmt-rule"></div>
          <div class="stmt-scroll"><table class="stmt-table"><tbody>${stmtRowsHtml(st)}</tbody></table></div>
          <p class="footnote">${key === "cf" ? "" : esc(d.statements.basis) + ". "}Source: QuickBooks Online, ${esc(d.client.name)}. Prepared by TurnkeyCFO.</p>
        </article>
      </section>`;
    }

    // ---- Download PDF: print ONLY this statement (browser save-as-PDF) ----
    function downloadPdf(key) {
      const st = DATA.statements[key];
      document.body.setAttribute("data-print", key);
      const t0 = document.title;
      document.title = `${DATA.client.name} - ${st.title} - ${DATA.period.label}`;
      const cleanup = () => {
        document.body.removeAttribute("data-print");
        document.title = t0;
        window.removeEventListener("afterprint", cleanup);
      };
      window.addEventListener("afterprint", cleanup);
      window.print();
      setTimeout(cleanup, 2000);
    }

    // ---- Download Excel: minimal .xlsx writer (STORED zip; no external deps).
    // Same proven approach as the Turnkey Close Command payroll export. ----
    const XL_RELS = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
    function xlEsc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, ""); }
    function xlCol(i) { let s = ""; i++; while (i > 0) { const m = (i - 1) % 26; s = String.fromCharCode(65 + m) + s; i = Math.floor((i - 1) / 26); } return s; }
    function xlSheetXml(rows) {
      let x = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols><col min="1" max="1" width="58" customWidth="1"/><col min="2" max="2" width="17" customWidth="1"/></cols><sheetData>';
      rows.forEach((row, ri) => {
        x += '<row r="' + (ri + 1) + '">';
        row.forEach((c, ci) => {
          if (c == null || c.v == null || c.v === "") return;
          const ref = xlCol(ci) + (ri + 1);
          if (c.t == "n") x += '<c r="' + ref + '"><v>' + c.v + '</v></c>';
          else x += '<c r="' + ref + '" t="inlineStr"><is><t xml:space="preserve">' + xlEsc(c.v) + '</t></is></c>';
        });
        x += '</row>';
      });
      return x + '</sheetData></worksheet>';
    }
    const XL_CRC = (function () { const t = new Uint32Array(256); for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; } return t; })();
    function xlCrc32(b) { let c = 0xFFFFFFFF; for (let i = 0; i < b.length; i++) c = (c >>> 8) ^ XL_CRC[(c ^ b[i]) & 0xFF]; return (c ^ 0xFFFFFFFF) >>> 0; }
    function xlU16(n) { return [n & 255, (n >>> 8) & 255]; }
    function xlU32(n) { return [n & 255, (n >>> 8) & 255, (n >>> 16) & 255, (n >>> 24) & 255]; }
    function xlZip(files) {
      const chunks = []; let offset = 0; const central = []; const enc = new TextEncoder();
      for (const f of files) {
        const nameB = enc.encode(f.name); const data = f.data; const crc = xlCrc32(data);
        const lh = new Uint8Array([].concat(xlU32(0x04034b50), xlU16(20), xlU16(0), xlU16(0), xlU16(0), xlU16(0), xlU32(crc), xlU32(data.length), xlU32(data.length), xlU16(nameB.length), xlU16(0)));
        chunks.push(lh, nameB, data);
        const cd = new Uint8Array([].concat(xlU32(0x02014b50), xlU16(20), xlU16(20), xlU16(0), xlU16(0), xlU16(0), xlU16(0), xlU32(crc), xlU32(data.length), xlU32(data.length), xlU16(nameB.length), xlU16(0), xlU16(0), xlU16(0), xlU16(0), xlU32(0), xlU32(offset)));
        central.push(cd, nameB); offset += lh.length + nameB.length + data.length;
      }
      let cSize = 0; for (const c of central) cSize += c.length;
      const eocd = new Uint8Array([].concat(xlU32(0x06054b50), xlU16(0), xlU16(0), xlU16(files.length), xlU16(files.length), xlU32(cSize), xlU32(offset), xlU16(0)));
      const all = chunks.concat(central, [eocd]); let total = 0; for (const a of all) total += a.length;
      const out = new Uint8Array(total); let p = 0; for (const a of all) { out.set(a, p); p += a.length; } return out;
    }
    function xlBuild(sheets) {
      const enc = new TextEncoder();
      let ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
      let wbSheets = "", wbRels = ""; const parts = [];
      sheets.forEach((sh, i) => {
        const n = i + 1;
        ct += '<Override PartName="/xl/worksheets/sheet' + n + '.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
        wbSheets += '<sheet name="' + xlEsc(sh.name).slice(0, 31) + '" sheetId="' + n + '" r:id="rId' + n + '"/>';
        wbRels += '<Relationship Id="rId' + n + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet' + n + '.xml"/>';
        parts.push({ name: "xl/worksheets/sheet" + n + ".xml", data: enc.encode(xlSheetXml(sh.rows)) });
      });
      ct += '</Types>';
      const wb = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>' + wbSheets + '</sheets></workbook>';
      const wbr = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' + wbRels + '</Relationships>';
      const head = [{ name: "[Content_Types].xml", data: enc.encode(ct) }, { name: "_rels/.rels", data: enc.encode(XL_RELS) }, { name: "xl/workbook.xml", data: enc.encode(wb) }, { name: "xl/_rels/workbook.xml.rels", data: enc.encode(wbr) }];
      return xlZip(head.concat(parts));
    }
    function xlSave(bytes, fn) {
      const blob = new Blob([bytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const url = URL.createObjectURL(blob); const a = document.createElement("a");
      a.href = url; a.download = fn; document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1500);
    }
    function downloadXlsx(key) {
      const st = DATA.statements[key];
      const rows = [
        [{ t: "s", v: DATA.client.name }],
        [{ t: "s", v: st.title }],
        [{ t: "s", v: st.subtitle }],
        [{ t: "s", v: (key === "cf" ? "" : DATA.statements.basis + " - ") + "QuickBooks Online" }],
        [],
      ];
      st.rows.forEach(r => {
        const label = "    ".repeat(r.depth) + r.label;
        if (r.kind === "section" || r.amount == null) rows.push([{ t: "s", v: label }]);
        else rows.push([{ t: "s", v: label }, { t: "n", v: r.amount.toFixed(2) }]);
      });
      const bytes = xlBuild([{ name: st.title.slice(0, 31), rows }]);
      xlSave(bytes, `${DATA.client.name} - ${st.title} - ${DATA.period.label}.xlsx`);
    }

    // ---------- date helpers ----------
    const MONTHS_FULL = ["", "January", "February", "March", "April", "May", "June",
                         "July", "August", "September", "October", "November", "December"];
    function monthFull(ym) { const m = parseInt(ym.split("-")[1], 10); return MONTHS_FULL[m]; }
    function humanDate(iso) {
      const [y, m, dd] = iso.split("-").map(Number);
      return `${MONTHS_FULL[m]} ${dd}, ${y}`;
    }

    const ASOF_HUMAN = humanDate(DATA.balance_sheet.as_of);
    const BUILT_HUMAN = humanDate(DATA.built_at.slice(0, 10));

    // ---------- render ----------
    document.title = `${DATA.client.name} | ${DATA.period.label} Financial Dashboard`;
    document.getElementById("app").innerHTML =
      hero(DATA) + tabs(DATA) + qboPanel(DATA) +
      statementPanel(DATA, "pl") + statementPanel(DATA, "bs") + statementPanel(DATA, "cf") +
      givingPanel(DATA) +
      `<div class="footer">${esc(DATA.prepared_note)}</div>`;

    // ---------- interactivity: tabs + reveal ----------
    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        const target = button.dataset.target;
        document.querySelectorAll(".tab-button").forEach((item) => {
          const active = item === button;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", active ? "true" : "false");
        });
        document.querySelectorAll(".panel").forEach((panel) => {
          panel.classList.toggle("active", panel.id === target);
        });
      });
    });
    document.querySelectorAll("[data-reveal-target]").forEach((button) => {
      button.addEventListener("click", () => {
        const table = document.getElementById(button.dataset.revealTarget);
        if (!table) return;
        table.querySelectorAll(".amount-hidden").forEach((cell) => cell.classList.remove("amount-hidden"));
        button.disabled = true;
        button.textContent = "Amounts Revealed";
      });
    });
    document.querySelectorAll("[data-xl]").forEach((b) =>
      b.addEventListener("click", () => downloadXlsx(b.dataset.xl)));
    document.querySelectorAll("[data-pdf]").forEach((b) =>
      b.addEventListener("click", () => downloadPdf(b.dataset.pdf)));
  </script>
</body>
</html>
