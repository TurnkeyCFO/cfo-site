<style>

  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--txt);
       background:radial-gradient(1100px 620px at 50% -10%,var(--tint),var(--page) 60%);

  .box{width:100%;max-width:394px;background:var(--card);border:1px solid var(--line);border-radius:18px;

  .rule .a{background:var(--dk);width:55%;} .rule .b{background:var(--accent);width:25%;} .rule .c{background:var(--tan);width:20%;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:2.4px;color:var(--accent);text-transform:uppercase;text-align:center;}
  h1{font-size:23px;font-weight:800;color:var(--ink);text-align:center;margin:9px 0 6px;letter-spacing:-.3px;}
  .lede{font-size:13.5px;color:var(--mut);text-align:center;margin-bottom:22px;line-height:1.5;}

  input[type=password]{width:100%;font-family:inherit;font-size:17px;letter-spacing:3px;text-align:center;color:var(--txt);background:var(--page);
       border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;transition:border-color .15s;}
  input[type=password]:focus{outline:none;border-color:var(--accent);}
  button{width:100%;margin-top:15px;font-family:inherit;font-size:15px;font-weight:800;color:#fff;
       background:linear-gradient(135deg,var(--dk),var(--accent));border:none;border-radius:11px;padding:14px;cursor:pointer;transition:filter .15s;}
  button:hover{filter:brightness(1.05);}
  button:disabled{opacity:.6;cursor:default;}
  .err{display:none;margin-top:13px;font-size:13px;font-weight:600;color:#b42318;background:#fdeceb;
       border:1px solid #f6cfcb;border-radius:9px;padding:9px 12px;text-align:center;}
  .err.show{display:block;}
  .fine{margin-top:20px;font-size:11.5px;color:var(--mut);text-align:center;line-height:1.5;}

<script>
(function(){
  var data;
  try { data = JSON.parse(document.getElementById('tk-payload').textContent); }
  catch(e){ return; }
  var form = document.getElementById('unlockForm');
  var pw = document.getElementById('pw');
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  var SS_KEY = 'kcc-giving-key';
  function b64ToBuf(b64){ var bin=atob(b64),len=bin.length,buf=new Uint8Array(len); for(var i=0;i<len;i++){buf[i]=bin.charCodeAt(i);} return buf; }
  function bufToB64(buf){ var bytes=new Uint8Array(buf),bin=''; for(var i=0;i<bytes.length;i++){bin+=String.fromCharCode(bytes[i]);} return btoa(bin); }
  function fail(){ err.classList.add('show'); btn.disabled=false; pw.value=''; pw.focus(); }
  function deriveKey(password){
    return crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey'])
      .then(function(baseKey){
        return crypto.subtle.deriveKey(
          { name:'PBKDF2', salt:b64ToBuf(data.salt), iterations:data.iter, hash:'SHA-256' },
          baseKey, { name:'AES-GCM', length:256 }, true, ['decrypt']);
      });
  }
  function decryptWith(key){
    return crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBuf(data.iv) }, key, b64ToBuf(data.ct))
      .then(function(pt){ return new TextDecoder().decode(pt); });
  }
  function reveal(html, key){
    return crypto.subtle.exportKey('raw', key).then(function(raw){
      try { sessionStorage.setItem(SS_KEY, bufToB64(raw)); } catch(e){}
      document.open(); document.write(html); document.close();
    }, function(){ document.open(); document.write(html); document.close(); });
  }
  function tryCached(){
    var cached=null; try { cached=sessionStorage.getItem(SS_KEY); } catch(e){}
    if(!cached){ return; }
    crypto.subtle.importKey('raw', b64ToBuf(cached), { name:'AES-GCM', length:256 }, true, ['decrypt'])
      .then(function(key){ return decryptWith(key).then(function(html){ return reveal(html, key); }); })
      .catch(function(){ try { sessionStorage.removeItem(SS_KEY); } catch(e){} });
  }
  form.addEventListener('submit', function(e){
    e.preventDefault(); err.classList.remove('show'); btn.disabled=true;
    deriveKey(pw.value)
      .then(function(key){ return decryptWith(key).then(function(html){ return reveal(html, key); }); })
      .catch(function(){ fail(); });
  });
  tryCached();
})();
</script>
