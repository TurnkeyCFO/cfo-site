<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your P&L Says You're Profitable. Your Bank Account Says Otherwise. — Turnkey CFO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#00E676; --accent-deep:#00B050; --accent-dark:#007A33;
  --ink:#0A0A0A; --ink-soft:#3A3A3A; --bg:#FBFAF7; --surface:#FFFFFF;
  --hairline:#E7E5DF;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,sans-serif;
  background:var(--bg); color:var(--ink);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.slide{
  position:absolute;inset:0;display:none;
  flex-direction:column;justify-content:center;
  padding:6.5vh 9vw;
}
.slide.active{display:flex;animation:fade .42s ease}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.kicker{
  font-size:clamp(13px,1.5vw,18px);font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--accent-deep);margin-bottom:2.4vh;
  display:flex;align-items:center;gap:.7em;
}
.kicker::before{content:"";width:2.4em;height:3px;background:var(--accent);border-radius:3px}
h1{
  font-size:clamp(34px,6.2vw,82px);font-weight:800;line-height:1.06;
  letter-spacing:-.02em;max-width:20ch;
}
.subhead{
  font-size:clamp(17px,2.3vw,30px);font-weight:500;color:var(--ink-soft);
  margin-top:2.6vh;max-width:34ch;line-height:1.4;
}
ul{list-style:none;margin-top:4vh;display:flex;flex-direction:column;gap:1.9vh}
li{
  font-size:clamp(18px,2.45vw,33px);font-weight:600;line-height:1.3;
  padding-left:1.5em;position:relative;max-width:30ch;
}
li::before{
  content:"";position:absolute;left:0;top:.55em;width:.6em;height:.6em;
  background:var(--accent);border-radius:2px;transform:rotate(45deg);
}
/* title slide */
.slide.title{justify-content:center}
.slide.title h1{font-size:clamp(40px,7vw,96px);max-width:18ch}
.brandmark{
  display:flex;align-items:center;gap:.6em;font-weight:800;
  font-size:clamp(15px,1.8vw,22px);letter-spacing:-.01em;margin-bottom:4vh;
}
.brandmark .dot{width:.85em;height:.85em;background:var(--accent);
  border-radius:3px;transform:rotate(45deg)}
/* section divider */
.slide.section{background:var(--ink);color:var(--surface)}
.slide.section h1{font-size:clamp(40px,7.4vw,104px);max-width:16ch}
.slide.section .kicker{color:var(--accent)}
/* metric slide */
.metric-row{display:flex;gap:5vw;margin-top:5vh;flex-wrap:wrap}
.metric-card{
  background:var(--surface);border:1px solid var(--hairline);
  border-radius:18px;padding:4vh 3.4vw;min-width:300px;flex:1;
  box-shadow:0 16px 40px -28px rgba(0,0,0,.35);
}
.metric-card.lead{border-color:var(--accent);border-width:2px}
.metric-val{
  font-size:clamp(40px,6vw,86px);font-weight:800;letter-spacing:-.03em;
  color:var(--accent-dark);line-height:1;
}
.metric-card.muted .metric-val{color:var(--ink)}
.metric-lab{
  font-size:clamp(15px,1.9vw,24px);font-weight:600;color:var(--ink-soft);
  margin-top:1.6vh;line-height:1.35;max-width:22ch;
}
/* close slide */
.slide.close{background:var(--ink);color:var(--surface);justify-content:center}
.slide.close h1{font-size:clamp(38px,6.6vw,90px);max-width:19ch}
.slide.close .tagline{
  font-size:clamp(17px,2.2vw,28px);color:var(--accent);font-weight:700;
  margin-top:4.5vh;
}
.slide.close .byline{
  font-size:clamp(14px,1.6vw,19px);color:#9AA09C;font-weight:500;margin-top:1.4vh;
}
/* chrome */
#bar{position:fixed;top:0;left:0;height:5px;background:var(--accent);
  transition:width .42s ease;z-index:30}
#counter{
  position:fixed;bottom:3.2vh;right:3.5vw;font-size:14px;font-weight:700;
  color:var(--ink-soft);letter-spacing:.04em;z-index:30;
}
.slide.section ~ #counter,.slide.close ~ #counter{color:#fff}
#hint{
  position:fixed;bottom:3.2vh;left:3.5vw;font-size:12.5px;font-weight:600;
  color:var(--ink-soft);opacity:.62;z-index:30;letter-spacing:.02em;
}
#notes{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:rgba(10,10,10,.95);color:#F4F4F2;padding:22px 6vw 26px;
  font-size:clamp(15px,1.7vw,21px);line-height:1.5;font-weight:500;
  border-top:3px solid var(--accent);display:none;
}
#notes.show{display:block}
#notes .nl{font-size:11.5px;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);margin-bottom:7px}
@media print{#bar,#counter,#hint,#notes{display:none}}
</style>
</head>
<body>
<!-- generated 2026-05-18 20:37 | shoot 2026-05-18__profitable-but-broke -->
<div id="bar"></div>
<div id="stage"></div>
<div id="counter"></div>
<div id="hint">← → navigate &nbsp;·&nbsp; N notes &nbsp;·&nbsp; F fullscreen</div>
<div id="notes"></div>
<script>
const DECK = {"deck_title": "Your P&L Says You're Profitable. Your Bank Account Says Otherwise.", "slides": [{"type": "title", "headline": "Your P&L Says You're Profitable. Your Bank Account Says Otherwise.", "subhead": "That gap has a name — and a fix.", "note": "Open with the tension: the books look healthy but the checking account doesn't. Tell them this is a pattern, not a glitch, and you're going to walk through exactly why it happens and what to do this week."}, {"type": "section", "kicker": "Why Now", "headline": "Two things made this more common recently.", "note": "Credit is tighter than it used to be, so owners can't paper over a cash shortfall with a quick line-of-credit draw. And tools like QuickBooks Online default to accrual-basis reporting, which means revenue hits the P&L the moment you send an invoice — not when the customer pays."}, {"type": "content", "kicker": "Accrual Accounting", "headline": "Revenue records when you invoice, not when you're paid.", "points": ["QBO defaults to accrual-basis reporting", "Invoice sent = revenue on the books", "Cash in hand is a separate question", "Books look healthy; checking account may not"], "note": "This is the core mechanic behind the gap. Accrual accounting is standard and correct — it just means the P&L and the bank balance are measuring different things, and owners often don't realize that until it stings."}, {"type": "section", "kicker": "Three Root Causes", "headline": "Profit and cash diverge for three main reasons.", "note": "Transition into the meat of the talk. Profit is an accounting concept; cash is what pays your team on Friday. Walk through each cause one at a time."}, {"type": "content", "kicker": "Cause 1", "headline": "Unpaid invoices inflate your P&L.", "points": ["Revenue is recorded; cash has not arrived", "60- and 90-day balances add up fast", "Run AR Aging Summary in QBO now", "Anything past 30 days needs follow-up today"], "note": "Walk them to the report: Reports, then Accounts Receivable Aging Summary. If they invoiced $40,000 last month and $30,000 is still unpaid, that revenue is on the P&L but not in the bank. Don't wait until end of week to follow up."}, {"type": "metric", "kicker": "Cause 2", "headline": "Loan payments don't appear on your P&L.", "metric": {"value": "$8,000", "label": "net profit shown on P&L", "contrast_value": "$6,000", "contrast_label": "loan payment that never shows there"}, "note": "Debt repayment runs through the balance sheet, not the income statement. So you can show a healthy profit and still be writing a large check every month that the P&L never reflects. This catches a lot of owners off guard — it's not a bookkeeping error, it's just how it works."}, {"type": "content", "kicker": "Cause 3", "headline": "Prepaid costs leave the bank before the P&L feels them.", "points": ["Inventory purchased = cash out now", "Expense hits P&L only when inventory sells", "Same logic for prepaid software or insurance", "Profitable on paper; lighter in the bank"], "note": "If you bought $15,000 in inventory or paid six months of software licenses upfront, that cash is already gone. But it won't show as an expense until you sell the goods or the subscription period runs. The P&L looks fine; the bank balance tells a different story."}, {"type": "section", "kicker": "The Fix", "headline": "Three things you can start this week.", "note": "Shift from diagnosis to action. All three steps are practical and can be done inside QBO or with a simple policy decision — no outside tools required."}, {"type": "content", "kicker": "Fix 1", "headline": "Run a cash flow statement, not just your P&L.", "points": ["In QBO: Reports > Statement of Cash Flows", "Shows where cash came from and where it went", "Separate from profit — that's the point", "If you've never pulled this report, start now"], "note": "The Statement of Cash Flows is the report that reconciles profit to actual cash movement. Most owners only look at the P&L. This one report changes the conversation."}, {"type": "content", "kicker": "Fix 2 & 3", "headline": "Set a cash floor. Enforce your payment terms.", "points": ["Cash floor: minimum balance you will not go below", "Two weeks of operating expenses is a starting point", "Send AR reminders on day 28, not day 45", "QBO can automate payment reminders in customer settings"], "note": "A cash floor turns a vague worry into a clear signal — when you approach that number, act. On AR, net-30 terms only work if you enforce them. The QBO automation takes about ten minutes to set up and removes the awkwardness of manual follow-up."}, {"type": "close", "kicker": "Turnkey CFO", "headline": "Manage the profit number and the cash number — both.", "subhead": "Bookkeeping and financial clarity for small businesses.", "points": ["P&L and bank account tell different stories", "Understanding why is how you close the gap", "Link below if you want a second set of eyes"], "note": "Land the core message: profit matters, but cash is what keeps the business running between now and the end of the month. The answer isn't to trust one report and ignore the other — it's to understand why they differ and manage both. Invite them to reach out to Turnkey CFO if they want help working through this."}]};
const BRAND = {"name": "Turnkey CFO", "tagline": "Modern bookkeeping for small business.", "audience": "small-business owners and founders", "accent": "#00E676", "accent_deep": "#00B050", "accent_dark": "#007A33", "ink": "#0A0A0A", "ink_soft": "#3A3A3A", "bg": "#FBFAF7", "surface": "#FFFFFF", "hairline": "#E7E5DF", "font": "Plus Jakarta Sans", "google_font": "Plus+Jakarta+Sans:wght@400;500;600;700;800"};
let i = 0;
const stage = document.getElementById('stage');
const slides = DECK.slides;

function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,
  c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function slideHTML(s, idx){
  const t = s.type || 'content';
  let inner = '';
  if(t === 'title'){
    inner += '<div class="brandmark"><span class="dot"></span>'+esc(BRAND.name)+'</div>';
    if(s.kicker) inner += '<div class="kicker">'+esc(s.kicker)+'</div>';
    inner += '<h1>'+esc(s.headline)+'</h1>';
    if(s.subhead) inner += '<div class="subhead">'+esc(s.subhead)+'</div>';
  } else if(t === 'close'){
    inner += '<h1>'+esc(s.headline)+'</h1>';
    inner += '<div class="tagline">'+esc(BRAND.tagline)+'</div>';
    inner += '<div class="byline">'+esc(BRAND.name)+
             ' \u2014 bookkeeping and financial clarity for small businesses.</div>';
  } else {
    if(s.kicker) inner += '<div class="kicker">'+esc(s.kicker)+'</div>';
    inner += '<h1>'+esc(s.headline)+'</h1>';
    if(s.subhead) inner += '<div class="subhead">'+esc(s.subhead)+'</div>';
    if(t === 'metric' && s.metric){
      const m = s.metric;
      inner += '<div class="metric-row">';
      inner += '<div class="metric-card lead"><div class="metric-val">'+
        esc(m.value)+'</div><div class="metric-lab">'+esc(m.label)+'</div></div>';
      if(m.contrast_value){
        inner += '<div class="metric-card muted"><div class="metric-val">'+
          esc(m.contrast_value)+'</div><div class="metric-lab">'+
          esc(m.contrast_label)+'</div></div>';
      }
      inner += '</div>';
    }
    if(s.points && s.points.length){
      inner += '<ul>'+s.points.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul>';
    }
  }
  return '<section class="slide '+t+(idx===0?' active':'')+'">'+inner+'</section>';
}

stage.innerHTML = slides.map(slideHTML).join('');
const els = [...document.querySelectorAll('.slide')];

function show(n){
  i = Math.max(0, Math.min(slides.length-1, n));
  els.forEach((e,x)=>e.classList.toggle('active', x===i));
  document.getElementById('bar').style.width =
    ((i+1)/slides.length*100)+'%';
  document.getElementById('counter').textContent =
    (i+1)+' / '+slides.length;
  const note = slides[i].note || 'No speaker note for this slide.';
  document.getElementById('notes').innerHTML =
    '<div class="nl">Speaker note</div>'+esc(note);
}
function next(){show(i+1);}
function prev(){show(i-1);}

document.addEventListener('keydown', e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(slides.length-1);}
  else if(e.key==='n'||e.key==='N'){document.getElementById('notes').classList.toggle('show');}
  else if(e.key==='f'||e.key==='F'){
    if(document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
});
stage.addEventListener('click', e=>{
  (e.clientX < window.innerWidth*0.34) ? prev() : next();
});
show(0);
</script>
</body>
</html>
